name: unreal-engine
schema: 1
version: 2.0.2
scm: github.com/pubnub/unreal-engine
changelog:
  - date: 2026-04-20
    version: 2.0.2
    changes:
      - type: bug
        text: "Fix errors that could be printed when Subscription Objects were garbage collected."
      - type: bug
        text: "Fix compilation errors when C++ 20 support is not enabled by replace designated initializers."
  - date: 2026-04-02
    version: 2.0.1
    changes:
      - type: feature
        text: "Add a way to change pn-sdk, so it can be used by UE Chat SDK."
      - type: bug
        text: "Fix cleaning up PubnubClient in tests, so they don't leave open connections."
  - date: 2026-03-31
    version: 2.0.0
    changes:
      - type: feature
        text: "`UPubnubSubsystem` is now only for creating or resolving clients. All real work goes through `UPubnubClient`, so you can run several independent PubNub contexts (keys, user id, subscriptions) side by side."
      - type: feature
        text: "Subsystem-level methods and delegates are deprecated in favor of the same behavior on UPubnubClient. Call sites should move to the client; async entry points on the client use the Async suffix."
      - type: feature
        text: "Logging is no longer limited to default engine logging. Configure levels and sources with `FPubnubLoggerConfig` and `IPubnubLoggerInterface`, and optionally plug in custom loggers."
      - type: feature
        text: "Names without Async denote synchronous (blocking) APIs. …Async methods are non-blocking and take a callback. Use sync when you need a direct return on the same flow; use async when the game thread must not block."
      - type: feature
        text: "Outcomes use `FPubnubOperationResult` (status, error flag, message) inside dedicated FPubnub…Result structs for both synchronous returns and async callbacks. **BREAKING CHANGE**."
      - type: feature
        text: "Pagination uses `FPubnubPage` (Next / Prev) instead of ad hoc page strings. Where the backend supports it, set `IncludeTotalCount` on the relevant include struct and read `TotalCount` on the result."
      - type: feature
        text: "Set operations use FPubnub…InputData types with ForceSet* flags so individual fields can be cleared on the server, not only replaced with other values. **BREAKING CHANGE**."
      - type: improvement
        text: "Public types are grouped under a consistent FPubnub… scheme so delegates, results, and inputs read as one family and clash less with other code. **BREAKING CHANGE**."
  - date: 2026-03-17
    version: 1.2.1
    changes:
      - type: bug
        text: "Fix crash during subscription on Android caused by incorrect internal includes in C-Core library."
  - date: 2025-11-12
    version: 1.2.0
    changes:
      - type: feature
        text: "The `ListUsersFromChannel` method now returns a maximum of 1,000 occupants per channel. Previously, it would return all occupants regardless of count. If you have channels with more than 1,000 occupants, you must use pagination (new `Limit` and `Offset` parameters) to retrieve the complete list. **BREAKING CHANGE**."
  - date: 2025-09-11
    version: 1.1.0
    changes:
      - type: feature
        text: "Add implementation of Entities: `Channel`, `ChannelGroup`, `ChannelMetadata`, `UserMetadata` with all related PubNub functions."
      - type: feature
        text: "Add implementation of `Subscription` and `SubscriptionSet` objects. Add all necessary operations to add, remove, get subscriptions."
      - type: feature
        text: "Add implementation of Event Listeners - user can now bind a delegate to subscription for every event type separately or all of them at once."
      - type: bug
        text: "Clean up properly all C-Core subscriptions after `UnsubscribeFromAll`."
  - date: 2025-08-19
    version: v1.0.0
    changes:
      - type: feature
        text: "Add code samples for all UE SDK functions - they can be found in `PubnubLibraryTests` module in `Samples` directory."
      - type: feature
        text: "Add encryption support for AES and Legacy Cryptors - compatible with other PubNub SDKs encryption."
      - type: feature
        text: "Introduce a unified result field `FPubnubOperationResult` in delegates across all SDK functions."
      - type: feature
        text: "Add a delegate that can be used to listen for Subscribe and Unsubscribe functions completion result."
      - type: bug
        text: "Fix bug that in some functions using UTF8 characters would break the function."
      - type: bug
        text: "Fix bug that using AppContext functions with `Limit` over 100 would crash the engine. Now `Limit` will be clamped to accepted values."
      - type: bug
        text: "Fix bug that in some cases `SetAuthToken` would not work correctly. Add correct lifetime management for the provided token."
      - type: improvement
        text: "Rework `ParseToken` to return permissions in a more user-friendly format."
      - type: improvement
        text: "Remove `CipherKey` from `FPubnubPublishSettings`."
      - type: improvement
        text: "Rework `SetMemberships` and `SetChannelMembers` to have inputs as `FPubnubMembershipInputData` and `FPubnubChannelMemberInputData` instead of raw strings."
      - type: improvement
        text: "Remove deprecated '_JSON' functions."
      - type: improvement
        text: "Add functionality to skip some false warnings logged from C-Core."
      - type: improvement
        text: "Refactor the code to be much cleaner and commented properly."
      - type: improvement
        text: "Add `supported-unreal-engine-versions` field to .pubnub.yml file, so it can be used in documentation. Revisit and fix all other entries in .pubnub.yml."
  - date: 2025-06-16
    version: v0.3.3
    changes:
      - type: bug
        text: "Fix compilation errors that were present in UE 5.1 and UE 5.2 versions."
  - date: 2025-06-10
    version: v0.3.2
    changes:
      - type: feature
        text: "Add function DeleteMessages which can be used to delete messages from the history."
      - type: feature
        text: "Add function InitPubnubWithConfig which can be used to initialize PubnubSubsystem with custom config, separate from Project Settings."
      - type: improvement
        text: "Add PubSub samples"
      - type: improvement
        text: "Fix compilation warnings"
  - date: 2025-05-27
    version: v0.3.1
    changes:
      - type: feature
        text: "Add new overloads, for all function that return data, with native (not dynamic) delegates that can be used with Lambdas."
      - type: feature
        text: "Add publish/signal message serialization and deserialization - now any string can be send by those methods."
      - type: feature
        text: "Add unit and integration tests for all end points."
      - type: bug
        text: "Fix bug that UserID was not set immediately."
      - type: bug
        text: "Fix bug that only published messages were received from subscription, but not signals and other types."
      - type: bug
        text: "Fix bugs that group operations were sometimes returning previous responses."
      - type: bug
        text: "Fix bug that MessageCounts function was not always returning correct count."
      - type: bug
        text: "Fix incorrect sort and include parameters related to users." 
  - date: 2025-04-29
    version: v0.3.0
    changes:
     - type: feature
       text: "Rework GetMemberships, GetChannelMembers, GetAllUsersMetadataand GetAllChannelsMetadata to have dedicated structures for Include and Sort fields. Note: this is BREAKING CHANGE."
     - type: improvement
       text: "Change subscription loop to use Event Engine."
     - type: improvement
       text: "Mark _JSON functions as deprecated"
     - type: improvement
       text: "Remove not needed C-Core files. Leave only required headers."
     - type: bug
       text: "Fix bugs in parsing FetchHistory response."
     - type: bug
       text: "Fix bug that not all requested data was included in functions response when TotalCount was set."
  - date: 2025-02-12
    version: v0.2.6
    changes:
     - type: bug
       text: "Fix Auth Token related functions."
     - type: bug
       text: "Fix SetSecretKeyAutomatically setting to set the key properly."
     - type: bug
       text: "Fix 'PubnubLog: Error: Pubnub user ID is not set. Aborting operation.' false error."
  - date: 2025-02-06
    version: v0.2.5
    changes:
     - type: feature
       text: "Add plugin support for Linux and IOS projects."
  - date: 2025-01-21
    version: v0.2.4
    changes:
     - type: feature
       text: "Pass logs from c-core to UE sdk."
  - date: 2024-11-28
    version: v0.2.3
    changes:
     - type: bug
       text: "Fix incorrect memberships input object Json checks"
  - date: 2024-11-25
    version: v0.2.2
    changes:
     - type: feature
       text: "Add Unreal 5.5 support"
     - type: feature
       text: "Add documentation in code"
     - type: feature
       text: "Add CustomMessageType parameter to publish, signal and history"
     - type: improvement
       text: "Rename uuid to user in all inputs and functions."
     - type: improvement
       text: "Rename ChannelName to Channel in in function inputs."
  - date: 2024-09-16
    version: v0.1.4
    changes:
     - type: feature
       text: "Add proper MacOS static library"
  - date: 2024-09-13
    version: v0.1.3
    changes:
      - type: feature
        text: "fixes custom version of the C-core library"
  - date: 2024-09-11
    version: v0.1.2
    changes:
      - type: feature
        text: "Fixes for Unreal Engine Marketplace"
  - date: 2024-08-14
    version: v0.1.0
    changes:
      - type: feature
        text: "Initial PubNub Unreal Engine SDK release"
sdks:
  - 
      full-name: Unreal Engine SDK
      short-name: UnrealEngine
      artifacts:
        -
          artifact-type: library
          language: C++
          tier: 2
          tags:
            - Server
          source-repository: https://github.com/pubnub/unreal-engine
          documentation: https://www.pubnub.com/docs/sdks/unreal-engine/
          distributions:
            -
              distribution-type: source-code
              distribution-repository: GitHub release
              package-name: pubnub
              location: https://github.com/pubnub/unreal-engine/releases/tag/0.0.0
              supported-platforms:
                supported-operating-systems:
                  Linux:
                    runtime-version:
                      - Unreal Engine 5
                    minimum-os-version:
                      - Ubuntu 20.04 LTS
                    maximum-os-version:
                      - Ubuntu 24.04 LTS
                    target-architecture:
                      - x86-64
                  macOS:
                    runtime-version:
                      - Unreal Engine 5
                    minimum-os-version:
                      - macOS 12.5
                    maximum-os-version:
                      - macOS 15.5
                    target-architecture:
                      - x86-64
                  Windows:
                    runtime-version:
                      - Unreal Engine 5
                    minimum-os-version:
                      - Windows 10 Home
                    maximum-os-version:
                      - Windows 11 Pro
                    target-architecture:
                      - x86-64
  - 
      full-name: Unreal Engine SDK
      short-name: UnrealEngine
      artifacts:
        -
          artifact-type: plugin
          language: C++
          tags:
            - Server
          tier: 2
          source-repository: https://github.com/pubnub/unreal-engine
          documentation: https://www.pubnub.com/docs/sdks/unreal-engine/
          distributions:
            -
              distribution-type: source-code
              distribution-repository: FAB Marketplace
              package-name: PubNub SDK
              location: https://www.fab.com/listings/9501a8d6-f9e6-4cf8-8b56-d173bdb71fc4
              supported-platforms:
                supported-operating-systems:
                  Linux:
                    runtime-version:
                      - Unreal Engine 5
                    minimum-os-version:
                      - Ubuntu 20.04 LTS
                    maximum-os-version:
                      - Ubuntu 24.04 LTS
                    target-architecture:
                      - x86-64
                  macOS:
                    runtime-version:
                      - Unreal Engine 5
                    minimum-os-version:
                      - macOS 12.5
                    maximum-os-version:
                      - macOS 15.5
                    target-architecture:
                      - x86-64
                  Windows:
                    runtime-version:
                      - Unreal Engine 5
                    minimum-os-version:
                      - Windows 10 Home
                    maximum-os-version:
                      - Windows 11 Pro
                    target-architecture:
                      - x86-64
                supported-unreal-engine-versions:
                    minimum-ue-version:
                      - 5.0
